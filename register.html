<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>

        const firebaseConfig = {

            projectId: "opd-portal",
            storageBucket: "opd-portal.firebasestorage.app",
            messagingSenderId: "117719197995",

</head>
<body class="bg-gray-900 font-sans antialiased text-gray-200 h-screen flex items-center justify-center bg-cover bg-center" style="background-image: linear-gradient(rgba(17, 24, 39, 0.9), rgba(17, 24, 39, 0.95)), url('https://images.unsplash.com/photo-1595188812683-146e454f762d?q=80&w=2000&auto=format&fit=crop');">

    <div class="max-w-md w-full px-6">
        <div class="bg-gray-800 rounded-lg shadow-2xl overflow-hidden border border-gray-700">
            
            <div class="bg-lspd-blue p-6 text-center border-b-4 border-lspd-gold">
                <h1 class="text-xl font-bold text-white tracking-widest uppercase">LSPD Intranet</h1>
                <p class="text-sm text-lspd-gold font-bold uppercase mt-1">Officer Account Registration</p>
            </div>

            <div class="p-8">
                <div id="msg" class="hidden text-sm p-3 rounded mb-6 text-center"></div>

                <form id="registerForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-400 mb-1">Nama Lengkap Petugas</label>
                        <input type="text" id="reg-name" required placeholder="Contoh: Rijki Gustiansyah" class="w-full px-4 py-2 rounded bg-gray-700 border border-gray-600 text-white focus:border-lspd-gold outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-400 mb-1">Nomor Badge (Hanya Angka)</label>
                        <input type="number" id="reg-badge" required placeholder="Contoh: 1045" class="w-full px-4 py-2 rounded bg-gray-700 border border-gray-600 text-white focus:border-lspd-gold outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-400 mb-1">Buat Password</label>
                        <input type="password" id="reg-password" required placeholder="Minimal 6 karakter" class="w-full px-4 py-2 rounded bg-gray-700 border border-gray-600 text-white focus:border-lspd-gold outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-400 mb-1">Konfirmasi Password</label>
                        <input type="password" id="reg-confirm" required placeholder="Ulangi password" class="w-full px-4 py-2 rounded bg-gray-700 border border-gray-600 text-white focus:border-lspd-gold outline-none transition">
                    </div>
                    
                    <button type="submit" id="reg-btn" class="w-full bg-lspd-gold text-lspd-blue font-bold px-4 py-3 rounded hover:bg-yellow-500 transition duration-300 shadow-lg mt-4 uppercase tracking-wider">
                        Daftar Akun Polisi
                    </button>
                </form>
                
                <div class="text-center mt-6">
                    <a href="login.html" class="text-sm text-gray-500 hover:text-white transition">Sudah punya akun? Login di sini</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const msgBox = document.getElementById('msg');
        const btn = document.getElementById('reg-btn');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('reg-name').value;
            const badge = document.getElementById('reg-badge').value;
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;

            // Reset Notifikasi
            msgBox.className = "hidden text-sm p-3 rounded mb-6 text-center";

            // Validasi Sederhana
            if (password !== confirm) {
                showMsg("Password tidak cocok!", "error");
                return;
            }
            if (password.length < 6) {
                showMsg("Password minimal 6 karakter!", "error");
                return;
            }

            btn.innerText = "Mendaftarkan...";
            btn.disabled = true;

            const email = badge + "@lspd.internal";

            // PROSES FIREBASE
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Simpan Nama dan Badge ke Database Firestore
                    return db.collection("officers").doc(badge).set({
                        name: name,
                        badge: badge,
                        role: "Officer",
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                })
                .then(() => {
                    showMsg("Registrasi Berhasil! Mengalihkan...", "success");
                    setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                })
                .catch((error) => {
                    console.error(error);
                    showMsg("Gagal: " + error.message, "error");
                    btn.innerText = "Daftar Akun Polisi";
                    btn.disabled = false;
                });
        });

        function showMsg(text, type) {
            msgBox.innerText = text;
            msgBox.classList.remove('hidden');
            if(type === "error") {
                msgBox.classList.add('bg-red-900/50', 'text-red-200', 'border', 'border-red-500');
            } else {
                msgBox.classList.add('bg-green-900/50', 'text-green-200', 'border', 'border-green-500');
            }
        }
    </script>
</body>
</html>
